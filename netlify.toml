# Netlify config for gg.colorfashiondnf.com
# Static site — no build step. The real production target is IIS at
# gg.colorfashiondnf.com (D:\Data\Web\gg\); Netlify is kept as a mirror.

[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(self)"
    # Frontend only talks to same-origin /api/* (proxied to local FastAPI by IIS).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; media-src 'self' blob:;"
