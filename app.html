<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f8f9fa">
<title>GG Pickup</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚚%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f8f9fa;
    color: #1a1a2e;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---- Top Bar ---- */
  .topbar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-left h1 { font-size: 15px; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
  .topbar-left .date-badge {
    background: #f0f0f5;
    padding: 3px 9px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    white-space: nowrap;
  }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .btn {
    padding: 6px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #f0f0f5; color: #444; border: 1px solid #d0d0d8; }
  .btn-secondary:hover { background: #e4e4ec; }
  .btn-icon {
    background: none; border: none; cursor: pointer;
    font-size: 17px; color: #666; padding: 5px 7px; border-radius: 5px;
  }
  .btn-icon:hover { background: #f0f0f5; }

  /* ---- Summary Strip ---- */
  .summary {
    display: flex;
    gap: 14px;
    padding: 8px 16px;
    background: #fff;
    border-bottom: 1px solid #e8e8ee;
    font-size: 12px;
    color: #666;
    flex-wrap: wrap;
  }
  .summary strong { color: #1a1a2e; font-size: 13px; }

  /* ---- Filter tabs ---- */
  .filters {
    display: flex;
    gap: 3px;
    padding: 8px 16px;
    background: #fff;
    border-bottom: 2px solid #e0e0e0;
    overflow-x: auto;
  }
  .filter-tab {
    padding: 5px 11px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    color: #666;
    background: transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-tab:hover { background: #f5f5fa; }
  .filter-tab.active { background: #eef2ff; color: #2563eb; border-color: #c7d2fe; }
  .filter-tab .count {
    background: #e5e7eb; padding: 1px 5px; border-radius: 8px;
    font-size: 10px; margin-left: 3px;
  }
  .filter-tab.active .count { background: #c7d2fe; color: #2563eb; }

  /* ---- Week bar ---- */
  .week-bar {
    display: flex;
    gap: 3px;
    padding: 6px 16px;
    background: #fafbfd;
    border-bottom: 2px solid #e0e0e0;
    overflow-x: auto;
  }
  .week-tab {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    color: #777;
    background: transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .week-tab:hover { background: #eef0f5; }
  .week-tab.active { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }

  /* ---- Day separator row ---- */
  .day-header td {
    background: #f0f2f8;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 2px solid #d0d5e0;
  }
  .day-header .day-count {
    font-weight: 500;
    color: #888;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 8px;
  }

  /* ---- Table ---- */
  .table-wrap { padding: 8px 16px 80px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    font-size: 13px;
  }
  thead th {
    background: #f7f8fa;
    padding: 7px 10px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #666;
    border-bottom: 2px solid #e0e0e0;
    white-space: nowrap;
    position: sticky;
    top: 43px;
    z-index: 5;
  }
  tbody td {
    padding: 7px 10px;
    border-bottom: 1px solid #f0f0f4;
    vertical-align: middle;
  }
  tbody tr:hover { background: #fafbff; }
  tbody tr.expanded { background: #f5f7ff; }

  .knitter-cell { font-weight: 600; color: #1a1a2e; }
  .customer-cell { color: #555; }
  .qty-cell { text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }
  .lot-cell { font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 11px; color: #555; }

  .status {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .status-Pending { background: #fef3c7; color: #92400e; }
  .status-PickedUp { background: #d1fae5; color: #065f46; }
  .status-Cancelled { background: #fee2e2; color: #991b1b; }

  /* ---- Expand toggle ---- */
  .expand-toggle {
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: #888; padding: 2px 4px;
    border-radius: 3px; transition: all 0.15s;
  }
  .expand-toggle:hover { background: #eee; color: #333; }
  .expand-toggle.open { transform: rotate(90deg); color: #2563eb; }

  /* ---- Sub-rows (lots) ---- */
  .sub-row td {
    background: #fafbfd;
    padding: 5px 10px 5px 36px;
    font-size: 12px;
    border-bottom: 1px solid #f0f0f4;
  }
  .sub-row:hover td { background: #f0f3ff; }
  .sub-row .lot-cell { font-size: 11px; }
  .sub-row .qty-cell { font-size: 12px; }

  /* ---- Footer total ---- */
  tfoot td {
    padding: 8px 10px;
    font-weight: 700;
    background: #f7f8fa;
    border-top: 2px solid #e0e0e0;
    font-size: 12px;
  }

  /* ---- Row action (hover) ---- */
  .row-action {
    opacity: 0;
    transition: opacity 0.1s;
  }
  tr:hover .row-action { opacity: 1; }
  .pick-btn {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #166534;
    cursor: pointer;
  }
  .pick-btn:hover { background: #dcfce7; }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 50;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    width: 90%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-head {
    padding: 14px 18px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head h2 { font-size: 15px; font-weight: 700; }
  .modal-close {
    background: none; border: none; font-size: 20px;
    color: #999; cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { background: #f0f0f0; color: #333; }
  .modal-body { padding: 16px 18px; }

  .form-row { margin-bottom: 12px; }
  .form-row label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #666;
    margin-bottom: 4px;
  }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d0d0d8;
    border-radius: 5px;
    font-size: 14px;
    color: #1a1a2e;
    outline: none;
    font-family: inherit;
    background: #fafafa;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: #2563eb; background: #fff; }
  .form-row textarea { min-height: 60px; resize: vertical; }

  .modal-actions {
    padding: 12px 18px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ---- Detail modal ---- */
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f2f2f6;
    font-size: 13px;
  }
  .detail-row .dl { color: #888; font-size: 12px; }
  .detail-row .dv { font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }

  .detail-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .detail-actions .btn { justify-content: center; padding: 10px; font-size: 13px; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-outline-gray { background: #fff; color: #555; border: 1px solid #d0d0d8; }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #dc2626; }
  .toast.success { background: #16a34a; }

  .loading { text-align: center; padding: 40px; color: #888; font-size: 13px; }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid #ddd; border-top-color: #2563eb;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px 20px; color: #999; font-size: 13px; }
  .empty .emoji { font-size: 36px; display: block; margin-bottom: 8px; opacity: 0.5; }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    .topbar { padding: 8px 12px; }
    .topbar-left h1 { font-size: 14px; }
    .summary { padding: 6px 12px; gap: 10px; }
    .filters { padding: 6px 12px; }
    .table-wrap { padding: 6px 8px 80px; }
    thead th, tbody td { padding: 6px 6px; font-size: 12px; }
    .lot-cell { font-size: 10px; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <h1>🚚 GG Pickup</h1>
      <span class="date-badge" id="dateLabel"></span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" id="newBtn">+ New Pickup</button>
      <button class="btn-icon" id="refreshBtn" title="Refresh">↻</button>
      <button class="btn-icon" id="logoutBtn" title="Sign out">⎋</button>
    </div>
  </div>

  <div class="summary" id="summaryBar"></div>

  <div class="filters" id="filterBar">
    <div class="filter-tab active" data-filter="today" data-date-tab="true">Today <span class="count" id="countToday">0</span></div>
    <div class="filter-tab" data-filter="yesterday" data-date-tab="true">Yesterday <span class="count" id="countYesterday">0</span></div>
    <div class="filter-tab" data-filter="dayBefore" data-date-tab="true"><span id="dayBeforeLabel"></span> <span class="count" id="countDayBefore">0</span></div>
    <div class="filter-tab" data-filter="Pending">Pending <span class="count" id="countPending">0</span></div>
    <div class="filter-tab" data-filter="Picked Up">Picked Up <span class="count" id="countDone">0</span></div>
    <div class="filter-tab" data-filter="all">All <span class="count" id="countAll">0</span></div>
  </div>

  <div class="week-bar" id="weekBar" style="display:none"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:24px"></th>
          <th style="width:36px">#</th>
          <th>Knitter</th>
          <th>Customer</th>
          <th style="width:44px;text-align:center">Qty</th>
          <th>Lot Number</th>
          <th style="width:76px">Status</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8"><div class="loading"><span class="spinner"></span>Loading…</div></td></tr>
      </tbody>
      <tfoot id="tableFoot" style="display:none">
        <tr>
          <td></td>
          <td></td>
          <td>TOTAL LOTS</td>
          <td></td>
          <td style="text-align:center" id="totalQty">0</td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal">
      <div class="modal-head">
        <h2 id="detailTitle">Pickup Details</h2>
        <button class="modal-close" id="closeDetail">&times;</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- New pickup modal -->
  <div class="modal-overlay" id="newOverlay">
    <div class="modal">
      <div class="modal-head">
        <h2>New Pickup Request</h2>
        <button class="modal-close" id="closeNew">&times;</button>
      </div>
      <div class="modal-body">
        <form id="newForm" autocomplete="off">
          <div class="form-row">
            <label>Knitter *</label>
            <input id="f_knitter" required placeholder="e.g. BONATEX">
          </div>
          <div class="form-row">
            <label>Customer</label>
            <input id="f_customer" placeholder="e.g. DUC">
          </div>
          <div class="form-row">
            <label>Lot # (optional)</label>
            <input id="f_lot" placeholder="e.g. JCC-10176">
          </div>
          <div class="form-row">
            <label>Qty (lots)</label>
            <input id="f_qty" type="number" inputmode="numeric" value="1" min="0">
          </div>
          <div class="form-row">
            <label>Notes</label>
            <textarea id="f_notes" placeholder="Optional notes"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelNewBtn">Cancel</button>
        <button class="btn btn-primary" id="submitNewBtn">Create Pickup</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toastEl"></div>

<script type="module">
  import {
    supabase,
    requireSession,
    signOut,
    getCurrentAppUser,
  } from './supabase-client.js';

  const session = await requireSession();
  if (!session) throw new Error('no session');

  const appUser = await getCurrentAppUser();
  if (!appUser || !appUser.is_active) {
    await supabase.auth.signOut();
    window.location.replace('/index.html');
    throw new Error('not authorized');
  }

  // ---- Helpers ----
  function toISO(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function todayISO() { return toISO(new Date()); }
  function daysAgoISO(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return toISO(d);
  }

  const DATE_MAP = {
    today: todayISO(),
    yesterday: daysAgoISO(1),
    dayBefore: daysAgoISO(2),
  };

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function shortDate(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  let toastTimer;
  function toast(msg, type) {
    const el = document.getElementById('toastEl');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ---- State ----
  let requests = [];
  let currentFilter = 'today';
  let currentDateFilter = 'today';
  let currentMode = 'daily'; // 'daily' or 'weekly'
  let currentWeekStart = null;  // ISO string of Monday for selected week
  let expandedKnitters = new Set();

  // ---- Week helpers ----
  function getMonday(d) {
    const dt = new Date(d);
    const day = dt.getDay();
    const diff = dt.getDate() - day + (day === 0 ? -6 : 1); // Monday
    dt.setDate(diff);
    return dt;
  }

  function buildWeeks() {
    // Build week tabs: This Week, Last Week, 2 Weeks Ago, etc.
    const weeks = [];
    const today = new Date();
    const thisMonday = getMonday(today);

    for (let i = 0; i < 4; i++) {
      const mon = new Date(thisMonday);
      mon.setDate(mon.getDate() - (i * 7));
      const sun = new Date(mon);
      sun.setDate(sun.getDate() + 6);

      // Cap the end date to today
      const endDate = sun > today ? today : sun;

      const label = i === 0 ? 'This Week'
                  : i === 1 ? 'Last Week'
                  : shortDate(toISO(mon)) + ' \u2013 ' + shortDate(toISO(endDate));

      weeks.push({
        label,
        startISO: toISO(mon),
        endISO: toISO(endDate),
      });
    }
    return weeks;
  }

  function renderWeekBar() {
    const bar = document.getElementById('weekBar');
    const weeks = buildWeeks();
    bar.innerHTML = weeks.map((w, i) =>
      `<div class="week-tab ${currentWeekStart === w.startISO ? 'active' : ''}" data-start="${w.startISO}" data-end="${w.endISO}">${w.label}</div>`
    ).join('');

    bar.querySelectorAll('.week-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        bar.querySelectorAll('.week-tab').forEach(x => x.classList.remove('active'));
        tab.classList.add('active');
        currentWeekStart = tab.dataset.start;
        expandedKnitters.clear();
        const start = tab.dataset.start;
        const end = tab.dataset.end;
        document.getElementById('dateLabel').textContent = shortDate(start) + ' \u2013 ' + shortDate(end);
        loadWeekRequests(start, end);
      });
    });
  }

  // ---- Date labels ----
  document.getElementById('dateLabel').textContent = formatDate(todayISO());
  document.getElementById('dayBeforeLabel').textContent = shortDate(DATE_MAP.dayBefore);

  // ---- Tabs ----
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const f = t.dataset.filter;
      currentFilter = f;

      // If it's a date tab, switch to daily mode
      if (t.dataset.dateTab === 'true') {
        currentMode = 'daily';
        currentWeekStart = null;
        document.getElementById('weekBar').style.display = 'none';
        document.getElementById('weekBar').querySelectorAll('.week-tab').forEach(x => x.classList.remove('active'));
        const newDateFilter = f;
        if (newDateFilter !== currentDateFilter) {
          currentDateFilter = newDateFilter;
          expandedKnitters.clear();
          document.getElementById('dateLabel').textContent = formatDate(DATE_MAP[currentDateFilter]);
          loadRequests();
          return;
        }
        renderTable();
        return;
      }

      // If "Picked Up" is clicked, show week bar
      if (f === 'Picked Up') {
        currentMode = 'weekly';
        document.getElementById('weekBar').style.display = 'flex';
        renderWeekBar();
        // Auto-select "This Week"
        const weeks = buildWeeks();
        if (weeks.length > 0) {
          currentWeekStart = weeks[0].startISO;
          document.getElementById('weekBar').querySelector('.week-tab').classList.add('active');
          document.getElementById('dateLabel').textContent = weeks[0].label + ' (' + shortDate(weeks[0].startISO) + ' \u2013 ' + shortDate(weeks[0].endISO) + ')';
          loadWeekRequests(weeks[0].startISO, weeks[0].endISO);
        }
        return;
      }

      // For Pending, All — hide week bar and use daily mode
      currentMode = 'daily';
      currentWeekStart = null;
      document.getElementById('weekBar').style.display = 'none';
      renderTable();
    });
  });

  // ---- Load data for a single date (daily mode) ----
  async function loadRequests() {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="8"><div class="loading"><span class="spinner"></span>Loading\u2026</div></td></tr>';
    document.getElementById('tableFoot').style.display = 'none';

    const dateToLoad = DATE_MAP[currentDateFilter] || todayISO();
    const { data, error } = await supabase
      .from('greige_pickup_requests')
      .select('*')
      .eq('request_date', dateToLoad)
      .order('knitter', { ascending: true })
      .order('id', { ascending: true });

    if (error) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="8"><div class="empty"><span class="emoji">\u26a0\ufe0f</span>' + esc(error.message) + '</div></td></tr>';
      return;
    }
    requests = data || [];
    updateCounts();
    renderTable();
  }

  // ---- Load data for a week range ----
  async function loadWeekRequests(startISO, endISO) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="8"><div class="loading"><span class="spinner"></span>Loading\u2026</div></td></tr>';
    document.getElementById('tableFoot').style.display = 'none';

    const { data, error } = await supabase
      .from('greige_pickup_requests')
      .select('*')
      .gte('request_date', startISO)
      .lte('request_date', endISO)
      .eq('status', 'Picked Up')
      .order('request_date', { ascending: false })
      .order('knitter', { ascending: true })
      .order('id', { ascending: true });

    if (error) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="8"><div class="empty"><span class="emoji">\u26a0\ufe0f</span>' + esc(error.message) + '</div></td></tr>';
      return;
    }
    requests = data || [];
    updateCounts();
    renderWeeklyTable();
  }

  function filterRequests() {
    // Date tabs (today/yesterday/dayBefore) and 'all' show everything loaded
    if (currentFilter === 'today' || currentFilter === 'yesterday' || currentFilter === 'dayBefore' || currentFilter === 'all') return requests;
    return requests.filter(r => r.status === currentFilter);
  }

  function updateCounts() {
    const pending = requests.filter(r => r.status === 'Pending').length;
    const done = requests.filter(r => r.status === 'Picked Up').length;

    // Reset all date counts, then set the active one
    document.getElementById('countToday').textContent = currentDateFilter === 'today' ? requests.length : '';
    document.getElementById('countYesterday').textContent = currentDateFilter === 'yesterday' ? requests.length : '';
    document.getElementById('countDayBefore').textContent = currentDateFilter === 'dayBefore' ? requests.length : '';

    document.getElementById('countPending').textContent = pending;
    document.getElementById('countDone').textContent = done;
    document.getElementById('countAll').textContent = requests.length;

    const totalLots = requests.reduce((s,r) => s + (r.qty || 0), 0);
    document.getElementById('summaryBar').innerHTML =
      `<span><strong>${requests.length}</strong> pickups</span>` +
      `<span><strong>${totalLots}</strong> total lots</span>` +
      `<span><strong>${pending}</strong> pending</span>` +
      `<span><strong>${done}</strong> picked up</span>`;
  }

  // ---- Render table with expandable knitter groups ----
  function renderTable() {
    const filtered = filterRequests();
    const tbody = document.getElementById('tableBody');
    const tfoot = document.getElementById('tableFoot');

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty"><span class="emoji">\u2705</span>No pickups to show</div></td></tr>';
      tfoot.style.display = 'none';
      return;
    }

    // Group by knitter
    const groups = new Map();
    for (const r of filtered) {
      const key = r.knitter || '\u2014';
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(r);
    }

    let html = '';
    for (const [knitter, items] of groups) {
      const totalQty = items.reduce((s, r) => s + (r.qty || 0), 0);
      const isMulti = items.length > 1;
      const isExpanded = expandedKnitters.has(knitter);

      if (isMulti) {
        const allPending = items.every(r => r.status === 'Pending');
        const allDone = items.every(r => r.status === 'Picked Up');
        const statusHtml = allPending
          ? '<span class="status status-Pending">Pending</span>'
          : allDone
            ? '<span class="status status-PickedUp">Picked Up</span>'
            : '<span class="status" style="background:#e0e7ff;color:#3730a3;font-size:10px">Mixed</span>';
        const lotsPreview = items.map(r => r.lot_number).filter(Boolean).join(', ');

        html += `<tr class="parent-row ${isExpanded ? 'expanded' : ''}" data-knitter="${esc(knitter)}">
          <td><button class="expand-toggle ${isExpanded ? 'open' : ''}" data-knitter="${esc(knitter)}">\u25b6</button></td>
          <td style="color:#999">${items.length}</td>
          <td class="knitter-cell">${esc(knitter)}</td>
          <td class="customer-cell">${esc(items.map(r=>r.customer).filter(Boolean).join(', ') || '\u2014')}</td>
          <td class="qty-cell">${totalQty}</td>
          <td class="lot-cell">${esc(lotsPreview) || (isExpanded ? '' : '<span style="color:#bbb">\u2014</span>')}</td>
          <td>${statusHtml}</td>
          <td></td>
        </tr>`;

        if (isExpanded) {
          for (const r of items) {
            const sc = r.status === 'Picked Up' ? 'PickedUp' : r.status;
            html += `<tr class="sub-row" data-id="${r.id}">
              <td></td>
              <td style="color:#bbb;font-size:11px">${r.id}</td>
              <td></td>
              <td class="customer-cell">${esc(r.customer || '\u2014')}</td>
              <td class="qty-cell">${r.qty || 0}</td>
              <td class="lot-cell">${esc(r.lot_number || '')}</td>
              <td><span class="status status-${sc}">${esc(r.status)}</span></td>
              <td class="row-action">${r.status === 'Pending' ? '<button class="pick-btn" data-id="'+r.id+'">\u2713 Pick</button>' : ''}</td>
            </tr>`;
          }
        }
      } else {
        const r = items[0];
        const sc = r.status === 'Picked Up' ? 'PickedUp' : r.status;
        html += `<tr data-id="${r.id}">
          <td></td>
          <td style="color:#999">${r.id}</td>
          <td class="knitter-cell">${esc(r.knitter)}</td>
          <td class="customer-cell">${esc(r.customer || '\u2014')}</td>
          <td class="qty-cell">${r.qty || 0}</td>
          <td class="lot-cell">${esc(r.lot_number || '')}</td>
          <td><span class="status status-${sc}">${esc(r.status)}</span></td>
          <td class="row-action">${r.status === 'Pending' ? '<button class="pick-btn" data-id="'+r.id+'">\u2713 Pick</button>' : ''}</td>
        </tr>`;
      }
    }

    tbody.innerHTML = html;

    const totalLots = filtered.reduce((s, r) => s + (r.qty || 0), 0);
    document.getElementById('totalQty').textContent = totalLots;
    tfoot.style.display = '';

    tbody.querySelectorAll('.expand-toggle').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const k = btn.dataset.knitter;
        if (expandedKnitters.has(k)) expandedKnitters.delete(k);
        else expandedKnitters.add(k);
        renderTable();
      });
    });

    tbody.querySelectorAll('tr[data-id]').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.pick-btn')) return;
        openDetail(Number(row.dataset.id));
      });
    });

    tbody.querySelectorAll('.parent-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.expand-toggle')) return;
        const k = row.dataset.knitter;
        if (expandedKnitters.has(k)) expandedKnitters.delete(k);
        else expandedKnitters.add(k);
        renderTable();
      });
      row.style.cursor = 'pointer';
    });

    tbody.querySelectorAll('.pick-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        markPickedUp(Number(btn.dataset.id));
      });
    });
  }

  // ---- Render weekly table (grouped by day) ----
  function renderWeeklyTable() {
    const tbody = document.getElementById('tableBody');
    const tfoot = document.getElementById('tableFoot');

    if (requests.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty"><span class="emoji">\ud83d\udccb</span>No picked up items this week</div></td></tr>';
      tfoot.style.display = 'none';
      return;
    }

    // Group by date
    const byDate = new Map();
    for (const r of requests) {
      const dt = r.request_date;
      if (!byDate.has(dt)) byDate.set(dt, []);
      byDate.get(dt).push(r);
    }

    let html = '';
    for (const [date, items] of byDate) {
      const dayTotal = items.reduce((s, r) => s + (r.qty || 0), 0);
      html += `<tr class="day-header"><td colspan="8">${shortDate(date)}<span class="day-count"> \u2014 ${items.length} pickups, ${dayTotal} lots</span></td></tr>`;

      // Group by knitter within this day
      const groups = new Map();
      for (const r of items) {
        const key = r.knitter || '\u2014';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      }

      for (const [knitter, kItems] of groups) {
        const totalQty = kItems.reduce((s, r) => s + (r.qty || 0), 0);
        const isMulti = kItems.length > 1;
        const dayKnitterKey = date + '::' + knitter;
        const isExpanded = expandedKnitters.has(dayKnitterKey);

        if (isMulti) {
          const lotsPreview = kItems.map(r => r.lot_number).filter(Boolean).join(', ');
          html += `<tr class="parent-row ${isExpanded ? 'expanded' : ''}" data-knitter="${esc(dayKnitterKey)}">
            <td><button class="expand-toggle ${isExpanded ? 'open' : ''}" data-knitter="${esc(dayKnitterKey)}">\u25b6</button></td>
            <td style="color:#999">${kItems.length}</td>
            <td class="knitter-cell">${esc(knitter)}</td>
            <td class="customer-cell">${esc(kItems.map(r=>r.customer).filter(Boolean).join(', ') || '\u2014')}</td>
            <td class="qty-cell">${totalQty}</td>
            <td class="lot-cell">${esc(lotsPreview) || '<span style="color:#bbb">\u2014</span>'}</td>
            <td><span class="status status-PickedUp">Picked Up</span></td>
            <td></td>
          </tr>`;

          if (isExpanded) {
            for (const r of kItems) {
              html += `<tr class="sub-row" data-id="${r.id}">
                <td></td>
                <td style="color:#bbb;font-size:11px">${r.id}</td>
                <td></td>
                <td class="customer-cell">${esc(r.customer || '\u2014')}</td>
                <td class="qty-cell">${r.qty || 0}</td>
                <td class="lot-cell">${esc(r.lot_number || '')}</td>
                <td><span class="status status-PickedUp">Picked Up</span></td>
                <td></td>
              </tr>`;
            }
          }
        } else {
          const r = kItems[0];
          html += `<tr data-id="${r.id}">
            <td></td>
            <td style="color:#999">${r.id}</td>
            <td class="knitter-cell">${esc(r.knitter)}</td>
            <td class="customer-cell">${esc(r.customer || '\u2014')}</td>
            <td class="qty-cell">${r.qty || 0}</td>
            <td class="lot-cell">${esc(r.lot_number || '')}</td>
            <td><span class="status status-PickedUp">Picked Up</span></td>
            <td></td>
          </tr>`;
        }
      }
    }

    tbody.innerHTML = html;

    const totalLots = requests.reduce((s, r) => s + (r.qty || 0), 0);
    document.getElementById('totalQty').textContent = totalLots;
    tfoot.style.display = '';

    tbody.querySelectorAll('.expand-toggle').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const k = btn.dataset.knitter;
        if (expandedKnitters.has(k)) expandedKnitters.delete(k);
        else expandedKnitters.add(k);
        renderWeeklyTable();
      });
    });

    tbody.querySelectorAll('tr[data-id]').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.pick-btn')) return;
        openDetail(Number(row.dataset.id));
      });
    });

    tbody.querySelectorAll('.parent-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.expand-toggle')) return;
        const k = row.dataset.knitter;
        if (expandedKnitters.has(k)) expandedKnitters.delete(k);
        else expandedKnitters.add(k);
        renderWeeklyTable();
      });
      row.style.cursor = 'pointer';
    });
  }

  // ---- Detail modal ----
  function openDetail(id) {
    const r = requests.find(x => x.id === id);
    if (!r) return;
    const sc = r.status === 'Picked Up' ? 'PickedUp' : r.status;

    document.getElementById('detailTitle').textContent = '#' + r.id + ' \u00b7 ' + (r.knitter || '\u2014');
    document.getElementById('detailBody').innerHTML = `
      <div class="detail-row"><span class="dl">Status</span><span class="dv"><span class="status status-${sc}">${esc(r.status)}</span></span></div>
      <div class="detail-row"><span class="dl">Knitter</span><span class="dv">${esc(r.knitter)}</span></div>
      <div class="detail-row"><span class="dl">Customer</span><span class="dv">${esc(r.customer || '\u2014')}</span></div>
      <div class="detail-row"><span class="dl">Qty</span><span class="dv">${r.qty || 0} lots</span></div>
      <div class="detail-row"><span class="dl">Lot #</span><span class="dv">${esc(r.lot_number || '\u2014')}</span></div>
      <div class="detail-row"><span class="dl">Date</span><span class="dv">${esc(r.request_date || '\u2014')}</span></div>
      ${r.notes ? `<div class="detail-row"><span class="dl">Notes</span><span class="dv">${esc(r.notes)}</span></div>` : ''}
      ${r.picked_up_at ? `<div class="detail-row"><span class="dl">Picked Up</span><span class="dv">${new Date(r.picked_up_at).toLocaleString()}</span></div>` : ''}
      <div class="detail-actions">
        ${r.status === 'Pending' ? `<button class="btn btn-success" onclick="window._markPicked(${r.id})">\u2713 Mark as Picked Up</button>` : ''}
        ${r.status === 'Pending' ? `<button class="btn btn-danger" onclick="window._cancelPickup(${r.id})">Cancel Pickup</button>` : ''}
        ${r.status === 'Picked Up' ? `<button class="btn btn-outline-gray" onclick="window._undoPickup(${r.id})">\u21a9 Undo (Back to Pending)</button>` : ''}
        <button class="btn btn-outline-gray" onclick="document.getElementById('detailOverlay').classList.remove('show')">Close</button>
      </div>
    `;
    document.getElementById('detailOverlay').classList.add('show');
  }

  // ---- Actions ----
  async function getCoords() {
    return new Promise(res => {
      if (!navigator.geolocation) return res(null);
      navigator.geolocation.getCurrentPosition(
        p => res({ lat: p.coords.latitude, lng: p.coords.longitude }),
        () => res(null),
        { timeout: 5000, maximumAge: 60000 }
      );
    });
  }

  async function markPickedUp(id) {
    if (!confirm('Mark pickup #' + id + ' as Picked Up?')) return;
    const coords = await getCoords();
    const { error } = await supabase
      .from('greige_pickup_requests')
      .update({
        status: 'Picked Up',
        picked_up_at: new Date().toISOString(),
        picked_up_by: session.user.id,
        lat: coords?.lat ?? null,
        lng: coords?.lng ?? null,
      })
      .eq('id', id);

    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Marked as picked up \u2713', 'success');
    document.getElementById('detailOverlay').classList.remove('show');
    await loadRequests();
  }

  async function updateStatus(id, newStatus) {
    const body = { status: newStatus };
    if (newStatus === 'Pending') {
      body.picked_up_at = null;
      body.picked_up_by = null;
      body.lat = null;
      body.lng = null;
    }
    const { error } = await supabase
      .from('greige_pickup_requests')
      .update(body)
      .eq('id', id);

    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Status \u2192 ' + newStatus, 'success');
    document.getElementById('detailOverlay').classList.remove('show');
    await loadRequests();
  }

  // Expose to inline onclick
  window._markPicked = markPickedUp;
  window._cancelPickup = (id) => { if (confirm('Cancel pickup #'+id+'?')) updateStatus(id, 'Cancelled'); };
  window._undoPickup = (id) => { if (confirm('Undo pickup #'+id+'?')) updateStatus(id, 'Pending'); };

  // ---- New pickup ----
  document.getElementById('newBtn').addEventListener('click', () => {
    document.getElementById('f_knitter').value = '';
    document.getElementById('f_customer').value = '';
    document.getElementById('f_lot').value = '';
    document.getElementById('f_qty').value = 1;
    document.getElementById('f_notes').value = '';
    document.getElementById('newOverlay').classList.add('show');
  });
  document.getElementById('cancelNewBtn').addEventListener('click', () => {
    document.getElementById('newOverlay').classList.remove('show');
  });
  document.getElementById('closeNew').addEventListener('click', () => {
    document.getElementById('newOverlay').classList.remove('show');
  });

  document.getElementById('submitNewBtn').addEventListener('click', async () => {
    const knitter = document.getElementById('f_knitter').value.trim().toUpperCase();
    if (!knitter) { toast('Knitter is required', 'error'); return; }
    const btn = document.getElementById('submitNewBtn');
    btn.disabled = true; btn.textContent = 'Creating\u2026';

    const { data, error } = await supabase
      .from('greige_pickup_requests')
      .insert({
        request_date: todayISO(),
        knitter: knitter,
        customer: document.getElementById('f_customer').value.trim().toUpperCase(),
        lot_number: document.getElementById('f_lot').value.trim() || null,
        qty: Number(document.getElementById('f_qty').value) || 0,
        notes: document.getElementById('f_notes').value.trim() || null,
        status: 'Pending',
      })
      .select().single();

    btn.disabled = false; btn.textContent = 'Create Pickup';
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Pickup #' + data.id + ' created', 'success');
    document.getElementById('newOverlay').classList.remove('show');
    await loadRequests();
  });

  // ---- Other events ----
  document.getElementById('refreshBtn').addEventListener('click', loadRequests);
  document.getElementById('logoutBtn').addEventListener('click', () => { if (confirm('Sign out?')) signOut(); });
  document.getElementById('closeDetail').addEventListener('click', () => {
    document.getElementById('detailOverlay').classList.remove('show');
  });
  // Close modals on overlay click
  ['detailOverlay','newOverlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) e.target.classList.remove('show');
    });
  });

  // ---- Boot ----
  await loadRequests();
</script>
</body>
</html>
